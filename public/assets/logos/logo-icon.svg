<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Veridion Systems Ltd — Icon Mark
    V-Block: two thick arms with square terminal ends converging to a gold apex.
    Concept: two data inputs flowing into a single intelligent output.
    Style: flat, minimal, enterprise. No decoration.
  -->

  <!-- Dark container -->
  <rect width="48" height="48" rx="10" fill="#071923"/>

  <!-- Left arm: horizontal terminal → diagonal to apex -->
  <path d="M 6 13 H 15 L 24 35"
        stroke="#2BB9C8"
        stroke-width="5"
        stroke-linecap="square"
        stroke-linejoin="bevel"
        fill="none"/>

  <!-- Right arm: diagonal from apex → horizontal terminal -->
  <path d="M 24 35 L 33 13 H 42"
        stroke="#2BB9C8"
        stroke-width="5"
        stroke-linecap="square"
        stroke-linejoin="bevel"
        fill="none"/>

  <!-- Gold apex square — the output node -->
  <rect x="21.5" y="32.5" width="5" height="5" fill="#D6A93B"/>
</svg>
